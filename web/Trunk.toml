# Trunk reads `index.html`, builds `src/main.rs` for
# wasm32-unknown-unknown, runs wasm-bindgen, and emits the result
# into `dist/`. The axum UI server (../src/ui) rust-embeds that
# directory at compile time, so re-run `trunk build` after editing
# the web crate before rebuilding the host binary.

[build]
target = "index.html"
dist = "dist"
release = true

[watch]
ignore = ["dist"]
